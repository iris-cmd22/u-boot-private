name: "CodeQL"

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex libssl-dev bc device-tree-compiler swig python3-dev python3-setuptools

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build U-Boot (sandbox)
        run: |
          sed -i '/^YYLTYPE yylloc;/d' scripts/dtc/dtc-lexer.l
          cat > arch/sandbox/cpu/sdl.c << 'EOF'
          #include <errno.h>
          int sandbox_sdl_init_display(int width, int height, int log2_bpp)
          {
                  return -ENODEV;
          }
          int sandbox_sdl_sync(void *lcd_base)
          {
                  return -ENODEV;
          }
          int sandbox_sdl_scan_keys(int key[], int max_keys)
          {
                  return -ENODEV;
          }
          int sandbox_sdl_key_pressed(int keycode)
          {
                  return -ENODEV;
          }
          int sandbox_sdl_sound_play(const void *data, unsigned int count)
          {
                  return -ENODEV;
          }
          int sandbox_sdl_sound_stop(void)
          {
                  return -ENODEV;
          }
          int sandbox_sdl_sound_init(int rate, int channels)
          {
                  return -ENODEV;
          }
          EOF
          make sandbox_defconfig
          make -j$(nproc) HOSTCFLAGS="-fcommon"
        env:
          KCFLAGS: -fcommon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4