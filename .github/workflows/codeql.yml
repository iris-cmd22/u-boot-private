name: "CodeQL"

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex libssl-dev bc device-tree-compiler swig python3-dev python3-setuptools

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build U-Boot (sandbox)
        run: |
          sed -i '/^YYLTYPE yylloc;/d' scripts/dtc/dtc-lexer.l
          make sandbox_defconfig
          sed -i '/sdl\.o/d' arch/sandbox/cpu/Makefile
          make -j$(nproc) HOSTCFLAGS="-fcommon"
        env:
          KCFLAGS: -fcommon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4